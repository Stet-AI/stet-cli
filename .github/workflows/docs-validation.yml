name: Validate Mintlify docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'BETA_QUICKSTART.md'
      - 'ONBOARDING.md'
      - 'PROMPT_COOKBOOK.md'
      - 'TROUBLESHOOTING.md'
      - '.github/workflows/docs-validation.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'BETA_QUICKSTART.md'
      - 'ONBOARDING.md'
      - 'PROMPT_COOKBOOK.md'
      - 'TROUBLESHOOTING.md'
      - '.github/workflows/docs-validation.yml'
  workflow_dispatch:
    inputs:
      base_sha:
        description: Git commit to compare for protected fallback files
        required: true
        type: string
      head_sha:
        description: Git commit containing the docs under validation
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.sha }}

      - name: Set up Node 22.18.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install pinned docs tooling
        working-directory: docs
        run: npm ci

      - name: Run deterministic validator tests
        working-directory: docs
        run: node --test scripts/validate-content-contract.test.mjs

      - name: Validate content contract and protected fallbacks
        working-directory: docs
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          EVENT_HEAD_SHA: ${{ github.sha }}
          INPUT_BASE_SHA: ${{ inputs.base_sha }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base_sha="$PR_BASE_SHA"
            head_sha="$EVENT_HEAD_SHA"
            npm run validate:contract -- --base-sha "$base_sha" --head-sha "$head_sha" --expected-base-sha "$base_sha"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            base_sha="$PUSH_BASE_SHA"
            head_sha="$EVENT_HEAD_SHA"
            npm run validate:contract -- --base-sha "$base_sha" --head-sha "$head_sha"
          else
            npm run validate:contract -- --base-sha "$INPUT_BASE_SHA" --head-sha "$INPUT_HEAD_SHA" --expected-base-sha "$INPUT_BASE_SHA"
          fi

      - name: Validate publication approval gate
        working-directory: docs
        run: npm run validate:publication

      - name: Validate Mintlify configuration
        working-directory: docs
        run: npm run validate:mint

      - name: Check links
        working-directory: docs
        run: npm run validate:links

      - name: Check accessibility
        working-directory: docs
        run: npm run validate:a11y
